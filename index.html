<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      color: #fff;
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    p {
      color: #666;
      font-size: 0.9rem;
    }

    #url-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f0f0f;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #url-input::placeholder { color: #444; }

    #url-input:focus { border-color: #555; }

    #shorten-btn {
      width: 100%;
      padding: 0.75rem;
      background: #fff;
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #shorten-btn:hover { background: #e0e0e0; }
    #shorten-btn:active { background: #c8c8c8; }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <h1>URL Shortener</h1>
      <p>Paste a long URL and get a short one back.</p>
    </div>
    <input
      id="url-input"
      type="url"
      placeholder="https://example.com/very/long/url..."
    />
    <button id="shorten-btn">Shorten URL</button>
  </div>
  <script src="linkShortener.js"></script>
</body>
</html>
